name: Code Quality

on:
  push:
    branches: ["feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run flake8 linter
        run: |
          # check for syntax errors and basic code issues
          # E501 is line length - ignored because it is too strict for comments
          flake8 src/ tests/ --max-line-length=100 --ignore=E501

      - name: Run pytest
        run: python -m pytest tests/ -v